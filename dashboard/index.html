<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>valantic — Knowledge Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            valantic: {
              dark:  '#332F49',
              coral: '#FF604D',
              light: '#F7F7F7',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-valantic-light min-h-screen text-valantic-dark">

  <!-- Header — white, clean, like valantic.com -->
  <header class="bg-white border-b border-gray-200 px-8 py-0 flex items-stretch shadow-sm">
    <!-- Logo block -->
    <a href="#" class="flex items-center py-4 pr-8 border-r border-gray-200 shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 270" class="h-7 w-auto" fill="#332F49">
        <polygon points="125.32 91.07 106.4 148.74 87.48 91.07 60 91.07 91.99 177.53 120.81 177.53 152.8 91.07 125.32 91.07"/>
        <path d="M240.91,177.53V91.07H216.12v9.66l-1.44-1.66C208.65,92.12,200,88.6,189,88.6a39.22,39.22,0,0,0-29.11,13.15,49.57,49.57,0,0,0,0,65.11A39.22,39.22,0,0,0,189,180c11,0,19.6-3.52,25.64-10.47l1.44-1.66v9.66Zm-46.58-20.91c-13,0-21.79-9-21.79-22.32S181.3,112,194.33,112s21.79,9,21.79,22.32S207.37,156.62,194.33,156.62Z"/>
        <path d="M378.89,177.53V91.07H354.1v9.66l-1.44-1.66C346.62,92.12,338,88.6,327,88.6a39.22,39.22,0,0,0-29.11,13.15,49.57,49.57,0,0,0,0,65.11A39.22,39.22,0,0,0,327,180c11,0,19.6-3.52,25.64-10.47l1.44-1.66v9.66ZM332.3,156.62c-13,0-21.79-9-21.79-22.32S319.27,112,332.3,112s21.79,9,21.79,22.32S345.34,156.62,332.3,156.62Z"/>
        <polygon points="253.12 57.43 253.12 177.53 277.91 177.53 277.91 49.99 253.12 57.43"/>
        <path d="M432.57,113.39a16.7,16.7,0,0,1,16.68,16.68v47.46H474V124.39a35.78,35.78,0,0,0-56.85-28.93l-1.31,1V91.07H391.1v86.47h24.79V130.07A16.7,16.7,0,0,1,432.57,113.39Z"/>
        <path d="M499.9,171.52c6.48,5.85,17.64,7.79,35.11,6.09V155.26c-8,.44-13.14.12-16-2.54a7.66,7.66,0,0,1-2.19-5.91v-32H535V91.07H516.86V60.71l-24.79,7.44V91.07H478V114.8h14.1v32C492.07,158.84,494.56,166.69,499.9,171.52Z"/>
        <rect x="542.82" y="91.07" width="24.79" height="86.47"/>
        <path d="M555.21,50a15,15,0,1,0,15,15A15.24,15.24,0,0,0,555.21,50Z"/>
        <path d="M638.38,146c-3.11,5.91-9.7,9.54-17.44,9.54-12,0-20.73-8.94-20.73-21.26S608.92,113,620.94,113c7.69,0,14.14,3.55,17.43,9.55L660,110c-7.74-13.24-22.49-21.43-38.71-21.43-26.15,0-45.88,19.65-45.88,45.7S595.14,180,621.29,180c16.25,0,31-8.26,38.71-21.6Z"/>
      </svg>
    </a>

    <!-- Title + subtitle -->
    <div class="flex items-center px-8 gap-3">
      <div>
        <div class="text-base font-semibold leading-tight text-valantic-dark">Knowledge Layer</div>
        <div class="text-xs text-gray-400 mt-0.5">Shared memory · any bot · one source of truth</div>
      </div>
    </div>

    <!-- Coral accent pill (right side) -->
    <div class="ml-auto flex items-center gap-3 pr-2">
      <span class="text-xs text-gray-400" id="last-updated"></span>
      <button id="add-fact-btn" class="bg-valantic-coral text-white text-sm font-semibold pl-3 pr-4 py-2 rounded-lg hover:bg-[#e0432f] transition-colors flex items-center gap-1.5">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 5v14M5 12h14"/></svg>
        Add fact
      </button>
      <span class="border border-gray-300 text-gray-400 text-xs font-semibold px-3 py-1 rounded-full">BETA</span>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="bg-white border-b border-gray-200 px-8 py-3 flex flex-wrap gap-4 items-center sticky top-0 z-10">
    <!-- Search -->
    <div class="relative min-w-[240px] max-w-xs">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input id="search" type="text" placeholder="Search facts…"
        class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 text-sm bg-valantic-light focus:outline-none focus:ring-2 focus:ring-valantic-coral/40 focus:border-valantic-coral transition-colors" />
    </div>

    <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>

    <!-- Type filters -->
    <div class="flex items-center gap-1.5 flex-wrap">
      <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Type</span>
      <button data-filter="type" data-value=""           class="chip active">All</button>
      <button data-filter="type" data-value="reference"  class="chip">Reference</button>
      <button data-filter="type" data-value="project"    class="chip">Project</button>
      <button data-filter="type" data-value="user"       class="chip">User</button>
      <button data-filter="type" data-value="feedback"   class="chip">Feedback</button>
    </div>

    <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>

    <!-- Bot filters -->
    <div class="flex items-center gap-1.5 flex-wrap">
      <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest mr-1">Bot</span>
      <button data-filter="bot" data-value=""          class="chip active">All</button>
      <button data-filter="bot" data-value="claude"    class="chip">Claude</button>
      <button data-filter="bot" data-value="chatgpt"   class="chip">ChatGPT</button>
      <button data-filter="bot" data-value="copilot"   class="chip">Copilot</button>
      <button data-filter="bot" data-value="vally"     class="chip">Vally</button>
      <button data-filter="bot" data-value="human"     class="chip">Human</button>
    </div>

    <div class="ml-auto text-sm text-gray-400 shrink-0 tabular-nums" id="count-label"></div>
  </div>

  <!-- Main content -->
  <main class="px-8 py-7 max-w-screen-xl mx-auto">

    <!-- Contradiction banner -->
    <div id="contradiction-banner" class="hidden mb-5 flex items-center gap-3 bg-white border-l-4 border-valantic-coral rounded-lg px-5 py-3 shadow-sm text-sm text-valantic-dark">
      <svg class="w-4 h-4 shrink-0 text-valantic-coral" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
      <span id="contradiction-text" class="font-medium"></span>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <div id="empty" class="hidden text-center text-gray-400 py-24 text-sm">No facts match your filters.</div>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" onclick="closeModal()" style="display:none;position:fixed;inset:0;background:rgba(30,26,46,.45);z-index:50;backdrop-filter:blur(2px)"></div>
  <div id="modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;width:min(640px,92vw);max-height:85vh;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.18);display:none;flex-direction:column;overflow:hidden">

    <!-- Modal header -->
    <div style="padding:24px 28px 20px;border-bottom:1px solid #F3F4F6;display:flex;align-items:flex-start;gap:16px">
      <div style="flex:1;min-width:0">
        <div id="modal-badges" style="display:flex;align-items:center;gap:8px;margin-bottom:10px"></div>
        <h2 id="modal-title" style="font-size:18px;font-weight:700;color:#332F49;line-height:1.35;margin:0"></h2>
      </div>
      <button id="detail-edit-btn" onclick="editCurrent()" style="flex-shrink:0;height:32px;padding:0 12px;border-radius:8px;border:1px solid #E5E7EB;background:white;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:#332F49;font-size:13px;font-weight:600;transition:all .15s" onmouseover="this.style.borderColor='#FF604D';this.style.color='#FF604D'" onmouseout="this.style.borderColor='#E5E7EB';this.style.color='#332F49'">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5m-1.414-9.414a2 2 0 1 1 2.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        Edit
      </button>
      <button onclick="closeModal()" style="flex-shrink:0;width:32px;height:32px;border-radius:8px;border:1px solid #E5E7EB;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;transition:background .15s" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='white'">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Modal body -->
    <div style="padding:24px 28px;overflow-y:auto;flex:1">
      <p id="modal-body" style="font-size:14px;color:#374151;line-height:1.75;margin:0 0 24px"></p>

      <!-- Metadata table -->
      <div style="border:1px solid #F3F4F6;border-radius:10px;overflow:hidden">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <tbody id="modal-meta"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add / Edit fact modal (Maike) -->
  <div id="form-backdrop" onclick="closeFactForm()" style="display:none;position:fixed;inset:0;background:rgba(30,26,46,.45);z-index:60;backdrop-filter:blur(2px)"></div>
  <div id="form-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:61;width:min(680px,94vw);max-height:90vh;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.18);flex-direction:column;overflow:hidden">

    <div class="flex items-start gap-3" style="padding:22px 28px 16px;border-bottom:1px solid #F3F4F6">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-valantic-coral">✦</span>
          <h2 id="ff-title" class="text-lg font-bold text-valantic-dark leading-tight">Add a fact</h2>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">Tell it in plain language — Claude extracts the fields.</div>
      </div>
      <span id="ff-extract-pill" class="text-[11px] font-medium px-2.5 py-1 rounded-full bg-gray-100 text-gray-500 shrink-0 self-center">extraction…</span>
      <button onclick="closeFactForm()" style="flex-shrink:0;width:32px;height:32px;border-radius:8px;border:1px solid #E5E7EB;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;transition:background .15s" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='white'">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div style="padding:20px 28px;overflow-y:auto" class="space-y-4">
      <div id="ff-story-section">
        <textarea id="ff-story" rows="3" class="ff-input" placeholder="e.g. We just moved the CRA gap-assessment template to the compliance share, and Maya in the CISO office owns it now."></textarea>
        <div class="mt-2 flex flex-wrap gap-1.5 items-center">
          <span class="text-[11px] text-gray-400 mr-0.5">try:</span>
          <button type="button" class="ff-example chip" style="font-size:11px;padding:3px 10px">CRA template moved</button>
          <button type="button" class="ff-example chip" style="font-size:11px;padding:3px 10px">go-to SAP integration expert</button>
          <button type="button" class="ff-example chip" style="font-size:11px;padding:3px 10px">estimation rule of thumb</button>
        </div>
        <div class="mt-3 flex flex-wrap items-center gap-3">
          <button id="ff-extract-btn" type="button" class="bg-valantic-coral text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#e0432f] transition-colors disabled:opacity-50">✨ Extract fields</button>
          <button id="ff-manual-btn" type="button" class="text-sm text-gray-500 hover:text-valantic-coral transition-colors">or fill in manually</button>
          <span id="ff-extract-msg" class="text-sm"></span>
        </div>
        <div style="border-top:1px solid #F3F4F6;margin-top:18px"></div>
      </div>

      <div>
        <label class="block text-sm font-medium text-valantic-dark mb-1">Description <span class="text-valantic-coral">*</span></label>
        <input id="ff-description" type="text" maxlength="180" class="ff-input" placeholder="One line — the recall hook" />
      </div>
      <div>
        <label class="block text-sm font-medium text-valantic-dark mb-1">Slug (file name) <span class="text-valantic-coral">*</span></label>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">memory/</span>
          <input id="ff-name" type="text" class="ff-input flex-1" style="font-family:ui-monospace,monospace" placeholder="kebab-case-name" />
          <span class="text-xs text-gray-400">.md</span>
        </div>
        <p id="ff-name-warn" class="mt-1 text-xs text-amber-600 hidden"></p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Type</label>
          <select id="ff-type" class="ff-input"><option value="reference">reference</option><option value="user">user</option><option value="feedback">feedback</option><option value="project">project</option></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Practice</label>
          <input id="ff-practice" type="text" list="ff-practice-list" class="ff-input" placeholder="valantic practice area" />
          <datalist id="ff-practice-list"><option value="SAP Core Business Services"></option><option value="Strategy &amp; Transformation"></option><option value="Transformation &amp; Security"></option><option value="Customer Experience"></option><option value="Data &amp; AI"></option></datalist>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Source bot</label>
          <select id="ff-source-bot" class="ff-input"><option value="human">human</option><option value="claude">claude</option><option value="chatgpt">chatgpt</option><option value="copilot">copilot</option><option value="vally">vally</option></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Origin</label>
          <select id="ff-origin" class="ff-input"><option value="manual">manual</option><option value="conversation">conversation</option><option value="document">document</option></select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-valantic-dark mb-1">Fact <span class="text-valantic-coral">*</span></label>
        <textarea id="ff-body" rows="4" class="ff-input" placeholder="The fact itself — placeholders only for sensitive values."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Related facts</label>
          <input id="ff-related" type="text" class="ff-input" placeholder="comma-separated slugs" />
        </div>
        <div>
          <label class="block text-sm font-medium text-valantic-dark mb-1">Created</label>
          <input id="ff-created" type="date" class="ff-input" />
        </div>
      </div>
      <div class="flex items-center gap-2 pt-1">
        <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest mr-0.5">on the grid</span>
        <span id="ff-badge-type" class="badge-type"></span>
        <span id="ff-badge-bot" class="badge-bot"></span>
      </div>
    </div>

    <div class="flex items-center gap-3" style="padding:16px 28px;border-top:1px solid #F3F4F6">
      <button id="ff-save-btn" type="button" class="bg-valantic-coral text-white text-sm font-semibold px-5 py-2.5 rounded-lg hover:bg-[#e0432f] transition-colors disabled:opacity-50">Save fact</button>
      <button id="ff-cancel-btn" type="button" class="text-sm text-gray-500 hover:text-valantic-dark transition-colors">Cancel</button>
      <span id="ff-msg" class="text-sm ml-auto"></span>
    </div>
  </div>

  <style>
    .ff-input { width:100%;border-radius:8px;border:1px solid #e5e7eb;background:#F7F7F7;padding:8px 12px;font-size:14px;color:#332F49;outline:none;transition:all .15s }
    .ff-input:focus { border-color:#FF604D;box-shadow:0 0 0 3px rgba(255,96,77,.18) }
  </style>

  <style>
    .chip {
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #e5e7eb;
      background: white;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .chip:hover { background: #f3f4f6; border-color: #d1d5db; }
    .chip.active { background: #FF604D; color: white; border-color: #FF604D; }

    .badge-bot  { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1; }
    .badge-type { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.4; }
  </style>

  <script>
    const API_URL  = 'http://127.0.0.1:8787/api/memories';
    const USE_MOCK = false; // Jenny's API is live at 127.0.0.1:8787

    const MOCK = [
      {
        name: 'prod-access-policy',
        description: 'Three-tier production access policy and request procedure',
        type: 'reference', source_bot: 'claude', created: '2026-06-16', version: 2,
        body: 'Read-only: 2 weeks tenure + SRE pairing session. Read-write: 6 weeks + SRE sign-off. Privileged: on-call certification (~12 weeks). Requests via #sre-access-requests, tag manager + SRE on rota. Urgent P1: 24 h temporary access, pairing within 5 days.'
      },
      {
        name: 'onboarding-handbook',
        description: 'Engineering onboarding handbook — first two weeks guide',
        type: 'reference', source_bot: 'claude', created: '2026-06-16', version: 1,
        body: 'Day 1: laptop + YubiKey + accounts (email, Slack, GitHub, read-only staging). No prod access day 1. Day 2–5: buddy pairing, git workflow (trunk-based, 2 approvals), on-call intro, blameless post-mortems within 48 h.'
      },
      {
        name: 'team-directory',
        description: 'Engineering leadership and SRE team directory',
        type: 'reference', source_bot: 'claude', created: '2026-06-16', version: 1,
        body: 'Head of Engineering: <person>. Head of SRE: <person> (owns on-call). Head of Platform: <person> (auth/signing/tenant-config). Head of Security: <person>. On-call rotation: check PagerDuty for current week.'
      },
      {
        name: 'cra-gap-assessment',
        description: 'Where the EU Cyber Resilience Act gap-assessment template lives',
        type: 'reference', source_bot: 'chatgpt', created: '2026-06-15', version: 1,
        body: 'The CRA gap-assessment template is at <path>. Owner: <person>. Last reviewed: <date>. Related: [[nis2-scope-checklist]].'
      },
      {
        name: 'nis2-scope-checklist',
        description: 'NIS2 in-scope entity checklist for valantic clients',
        type: 'reference', source_bot: 'vally', created: '2026-06-14', version: 1,
        body: 'Checklist to determine if a client falls under NIS2 essential/important entity classification. Maintained by <person>. Ask CISO for compliance specifics — do not invent policy.'
      },
      {
        name: 'iec62443-reference',
        description: 'IEC 62443 OT security framework pointer for industrial clients',
        type: 'reference', source_bot: 'copilot', created: '2026-06-13', version: 1,
        body: 'IEC 62443 applies to OT/ICS environments. Relevant valantic service line: <team>. For scoping questions contact <person>. Related: [[cra-gap-assessment]].'
      },
      {
        name: 'valantic-brand-colors',
        description: 'Official valantic brand color palette for dashboards and presentations',
        type: 'project', source_bot: 'claude', created: '2026-06-16', version: 1,
        body: 'Dark purple: #332F49. Coral accent: #FF604D. Off-white background: #F7F7F7. Use white text on coral. All dashboards and pitch decks must follow this palette.'
      },
      {
        name: 'hackathon-demo-script',
        description: 'Live demo script for the 3-min knowledge layer pitch',
        type: 'project', source_bot: 'claude', created: '2026-06-16', version: 1,
        body: '1. Show dashboard with seeded facts. 2. Ask Claude a CRA question, tell it to remember. 3. Claude calls memory_write. 4. Refresh → new card with Claude badge. 5. Point to chatgpt/vally cards — same store. 6. Edit a fact → Claude recalls it next session.'
      }
    ];

    const BOT_STYLE = {
      claude:  { bg: 'background:#FFF3F2; color:#C0392B',  dot: 'background:#FF604D', label: 'Claude'  },
      chatgpt: { bg: 'background:#ECFDF5; color:#166534',  dot: 'background:#22C55E', label: 'ChatGPT' },
      copilot: { bg: 'background:#EFF6FF; color:#1D4ED8',  dot: 'background:#3B82F6', label: 'Copilot' },
      vally:   { bg: 'background:#F5F3FF; color:#6D28D9',  dot: 'background:#8B5CF6', label: 'Vally'   },
    };

    const TYPE_STYLE = {
      reference: 'background:#F3F4F6; color:#374151',
      project:   'background:#EEF2FF; color:#3730A3',
      user:      'background:#F0FDFA; color:#0F766E',
      feedback:  'background:#FFF1F2; color:#BE123C',
    };

    let allFacts = [], activeType = '', activeBot = '', searchQ = '';

    async function loadFacts() {
      if (USE_MOCK) {
        allFacts = MOCK;
      } else {
        try {
          const res = await fetch(API_URL);
          allFacts = await res.json();
        } catch (e) {
          console.error('API unreachable, falling back to mock:', e);
          allFacts = MOCK;
        }
      }
      document.getElementById('last-updated').textContent = USE_MOCK ? 'mock data' : `updated ${new Date().toLocaleTimeString()}`;
      detectContradictions();
      render();
    }

    function detectContradictions() {
      const seen = {}, dupes = new Set();
      for (const f of allFacts) {
        const k = f.name.toLowerCase();
        if (seen[k]) dupes.add(f.name);
        seen[k] = true;
      }
      const banner = document.getElementById('contradiction-banner');
      const text   = document.getElementById('contradiction-text');
      if (dupes.size > 0) {
        text.textContent = `Possible contradiction: duplicate fact names detected — ${[...dupes].join(', ')}`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    function render() {
      const q = searchQ.toLowerCase();
      const filtered = allFacts.filter(f => {
        if (activeType && f.type !== activeType) return false;
        if (activeBot  && f.source_bot !== activeBot) return false;
        if (q && ![f.description, f.body, f.name].some(s => s.toLowerCase().includes(q))) return false;
        return true;
      });

      document.getElementById('count-label').textContent =
        `${filtered.length} / ${allFacts.length} fact${allFacts.length !== 1 ? 's' : ''}`;

      const grid  = document.getElementById('grid');
      const empty = document.getElementById('empty');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(cardHTML).join('');
    }

    function cardHTML(f) {
      const bot      = BOT_STYLE[f.source_bot] || { bg: 'background:#F3F4F6;color:#374151', dot: 'background:#9CA3AF', label: f.source_bot };
      const typeStyle = TYPE_STYLE[f.type] || 'background:#F3F4F6;color:#374151';
      const snippet  = f.body.length > 130 ? f.body.slice(0, 130) + '…' : f.body;
      const linked   = esc(snippet).replace(/\[\[([^\]]+)\]\]/g, '<span style="color:#FF604D;font-style:italic">$1</span>');

      return `<div onclick="openModal('${esc(f.name)}')" style="cursor:pointer;background:white;border-radius:12px;border:1px solid #E5E7EB;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:24px;display:flex;flex-direction:column;gap:16px;transition:box-shadow .15s,border-color .15s" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.10)';this.style.borderColor='#FBBCB5'" onmouseout="this.style.boxShadow='0 1px 3px rgba(0,0,0,.06)';this.style.borderColor='#E5E7EB'">

        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span class="badge-type" style="${typeStyle}">${esc(f.type)}</span>
          <span class="badge-bot" style="${bot.bg}">
            <span style="width:7px;height:7px;border-radius:50%;${bot.dot};flex-shrink:0"></span>
            ${bot.label}
          </span>
        </div>

        <h3 style="font-size:15px;font-weight:600;color:#332F49;line-height:1.4;margin:0">${esc(f.description)}</h3>

        <p style="font-size:13px;color:#6B7280;line-height:1.65;flex:1;margin:0">${linked}</p>

        <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid #F3F4F6">
          <span style="font-family:ui-monospace,monospace;font-size:11px;color:#9CA3AF">${esc(f.name)}</span>
          <span style="font-size:11px;color:#9CA3AF">${esc(f.created)} · v${f.version}</span>
        </div>
      </div>`;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value; render(); });

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        const { filter, value } = btn.dataset;
        if (filter === 'type') {
          activeType = value;
          document.querySelectorAll('[data-filter="type"]').forEach(b => b.classList.toggle('active', b.dataset.value === value));
        } else {
          activeBot = value;
          document.querySelectorAll('[data-filter="bot"]').forEach(b => b.classList.toggle('active', b.dataset.value === value));
        }
        render();
      });
    });

    // ── Modal ────────────────────────────────────────────────────────────────
    function openModal(name) {
      const f = allFacts.find(x => x.name === name);
      if (!f) return;
      currentDetail = name;

      const bot       = BOT_STYLE[f.source_bot] || { bg: 'background:#F3F4F6;color:#374151', dot: 'background:#9CA3AF', label: f.source_bot };
      const typeStyle = TYPE_STYLE[f.type] || 'background:#F3F4F6;color:#374151';

      document.getElementById('modal-title').textContent = f.description;

      document.getElementById('modal-badges').innerHTML = `
        <span class="badge-type" style="${typeStyle}">${esc(f.type)}</span>
        <span class="badge-bot" style="${bot.bg}">
          <span style="width:7px;height:7px;border-radius:50%;${bot.dot};flex-shrink:0"></span>
          ${bot.label}
        </span>`;

      // Full body with [[links]] as clickable buttons
      const bodyLinked = esc(f.body).replace(/\[\[([^\]]+)\]\]/g, (_, link) =>
        `<button onclick="event.stopPropagation();openModal('${link}')" style="color:#FF604D;font-style:italic;font-weight:600;background:none;border:none;cursor:pointer;padding:0;font-size:inherit;font-family:inherit">${link}</button>`
      );
      document.getElementById('modal-body').innerHTML = bodyLinked;

      const metaRows = [
        ['Name',    `<span style="font-family:ui-monospace,monospace">${esc(f.name)}</span>`],
        ['Created', esc(f.created)],
        ['Version', `v${f.version}`],
        ['Source',  bot.label],
        ['Type',    `<span class="badge-type" style="${typeStyle}">${esc(f.type)}</span>`],
      ];
      document.getElementById('modal-meta').innerHTML = metaRows.map(([k, v], i) => `
        <tr style="border-top:${i > 0 ? '1px solid #F9FAFB' : 'none'}">
          <td style="padding:10px 16px;color:#9CA3AF;font-weight:500;white-space:nowrap;width:90px">${k}</td>
          <td style="padding:10px 16px;color:#332F49">${v}</td>
        </tr>`).join('');

      document.getElementById('modal-backdrop').style.display = 'block';
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-backdrop').style.display = 'none';
      document.getElementById('modal').style.display = 'none';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Add / Edit fact form (Maike) ───────────────────────────────────────────
    const _ffParams    = new URLSearchParams(location.search);
    const EXTRACT_BASE  = (_ffParams.get('extract') || 'http://127.0.0.1:8788').replace(/\/$/, '');
    const EXTRACT_URL    = EXTRACT_BASE + '/api/extract';
    const EXTRACT_HEALTH = EXTRACT_BASE + '/api/health';

    BOT_STYLE.human = { bg: 'background:#EEF2F7;color:#332F49', dot: 'background:#332F49', label: 'Human' };

    let currentDetail = null, ffEditing = null, ffNameEdited = false, ffExtractOnline = false;
    const ffEl    = id => document.getElementById(id);
    const ffSlug  = s => (s || '').toLowerCase().trim().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    const ffKebab = s => /^[a-z0-9]+(-[a-z0-9]+)*$/.test(s);
    const ffToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

    const FF_EXAMPLES = {
      'CRA template moved': 'We just moved the CRA gap-assessment template to the compliance share, and Maya Singh in the CISO office owns it now. Use it before quoting any CRA-readiness work for <kunde>.',
      'go-to SAP integration expert': 'For SAP order-management to commerce-frontend integration questions, Marco Reinhardt in SAP Core is the go-to. He owns the integration-pattern library and should be booked early on retail commerce engagements.',
      'estimation rule of thumb': 'Rule of thumb from the delivery-leads workshop: carry 20-25% contingency on any engagement crossing three or more practice areas, and size discovery at about 10% of total effort.',
    };

    function ffFlash(el, msg, kind) {
      el.textContent = msg;
      el.style.color = kind === 'ok' ? '#15803D' : kind === 'err' ? '#DC2626' : '#6B7280';
    }

    function ffRenderBadges() {
      const t = ffEl('ff-type').value, b = ffEl('ff-source-bot').value;
      ffEl('ff-badge-type').setAttribute('style', TYPE_STYLE[t] || 'background:#F3F4F6;color:#374151');
      ffEl('ff-badge-type').textContent = t;
      const bs = BOT_STYLE[b] || { bg: 'background:#F3F4F6;color:#374151', dot: 'background:#9CA3AF', label: b };
      ffEl('ff-badge-bot').setAttribute('style', bs.bg);
      ffEl('ff-badge-bot').innerHTML = `<span style="width:7px;height:7px;border-radius:50%;${bs.dot};flex-shrink:0"></span>${bs.label}`;
    }

    function ffCheckName() {
      const name = ffEl('ff-name').value.trim();
      const warn = ffEl('ff-name-warn');
      if (name && allFacts.some(f => f.name === name) && ffEditing !== name) {
        warn.textContent = `⚠ A fact named "${name}" exists — saving will update it (version bumps).`;
        warn.classList.remove('hidden');
      } else warn.classList.add('hidden');
    }

    function ffSet(fields) {
      if ('description' in fields) ffEl('ff-description').value = fields.description || '';
      if ('name' in fields) { ffEl('ff-name').value = fields.name || ''; ffNameEdited = true; }
      if (fields.type) ffEl('ff-type').value = fields.type;
      if ('practice' in fields) ffEl('ff-practice').value = fields.practice || '';
      if (fields.source_bot) ffEl('ff-source-bot').value = fields.source_bot;
      if (fields.origin) ffEl('ff-origin').value = fields.origin;
      if ('body' in fields) ffEl('ff-body').value = fields.body || '';
      if ('related' in fields) ffEl('ff-related').value = (fields.related || []).join(', ');
      if (fields.created) ffEl('ff-created').value = fields.created;
      ffRenderBadges(); ffCheckName();
    }

    function ffReset() {
      ['ff-story', 'ff-description', 'ff-name', 'ff-practice', 'ff-body', 'ff-related'].forEach(id => ffEl(id).value = '');
      ffEl('ff-type').value = 'reference';
      ffEl('ff-source-bot').value = 'human';
      ffEl('ff-origin').value = 'manual';
      ffEl('ff-created').value = ffToday();
      ffEl('ff-extract-msg').textContent = '';
      ffEl('ff-msg').textContent = '';
      ffEl('ff-name-warn').classList.add('hidden');
      ffNameEdited = false;
    }

    function openFactForm(mode, name) {
      ffReset();
      if (mode === 'edit' && name) {
        const f = allFacts.find(x => x.name === name);
        if (f) {
          ffEditing = name;
          let body = f.body || '', related = [];
          const m = body.match(/\n+Related:\s*(.+)\s*$/);
          if (m) { related = (m[1].match(/\[\[([^\]]+)\]\]/g) || []).map(x => x.replace(/\[\[|\]\]/g, '')); body = body.slice(0, m.index); }
          ffSet({ description: f.description, name: f.name, type: f.type, practice: f.practice, source_bot: f.source_bot, origin: f.origin, body: body.trim(), related, created: f.created });
        }
        ffEl('ff-name').readOnly = true;
        ffEl('ff-story-section').style.display = 'none';
        ffEl('ff-title').textContent = 'Edit fact';
      } else {
        ffEditing = null;
        ffEl('ff-name').readOnly = false;
        ffEl('ff-story-section').style.display = '';
        ffEl('ff-title').textContent = 'Add a fact';
      }
      ffEl('form-backdrop').style.display = 'block';
      ffEl('form-modal').style.display = 'flex';
      ffRenderBadges();
      setTimeout(() => (mode === 'edit' ? ffEl('ff-description') : ffEl('ff-story')).focus(), 30);
    }

    function closeFactForm() {
      ffEl('form-backdrop').style.display = 'none';
      ffEl('form-modal').style.display = 'none';
    }

    function editCurrent() { if (currentDetail) { closeModal(); openFactForm('edit', currentDetail); } }

    async function ffExtract() {
      const text = ffEl('ff-story').value.trim();
      if (!text) { ffFlash(ffEl('ff-extract-msg'), 'Type a fact or story first.', 'err'); return; }
      ffEl('ff-extract-btn').disabled = true;
      ffFlash(ffEl('ff-extract-msg'), 'Extracting…', 'muted');
      try {
        const r = await fetch(EXTRACT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
        if (!r.ok) throw new Error('server ' + r.status);
        const d = await r.json();
        ffNameEdited = false;
        ffSet({ ...d, source_bot: 'human', origin: 'manual', created: ffEl('ff-created').value || ffToday() });
        ffFlash(ffEl('ff-extract-msg'), 'Extracted ✓ — review and save.', 'ok');
      } catch (err) {
        ffFlash(ffEl('ff-extract-msg'), 'Extraction failed (' + err.message + '). Fill in manually.', 'err');
      } finally { ffEl('ff-extract-btn').disabled = !ffExtractOnline; }
    }

    async function ffSave() {
      const name = ffEl('ff-name').value.trim();
      const description = ffEl('ff-description').value.trim();
      const body = ffEl('ff-body').value.trim();
      const errs = [];
      if (!name) errs.push('a slug'); else if (!ffKebab(name)) errs.push('a valid kebab-case slug');
      if (!description) errs.push('a description');
      if (!body) errs.push('the fact body');
      if (errs.length) { ffFlash(ffEl('ff-msg'), 'Need ' + errs.join(', ') + '.', 'err'); return; }
      const related = ffEl('ff-related').value.split(',').map(ffSlug).filter(Boolean);
      let fullBody = body;
      if (related.length && !/\[\[/.test(fullBody)) fullBody += `\n\nRelated: ${related.map(r => `[[${r}]]`).join(', ')}`;
      const payload = {
        name, description, type: ffEl('ff-type').value, practice: ffEl('ff-practice').value.trim(),
        source_bot: ffEl('ff-source-bot').value, origin: ffEl('ff-origin').value,
        body: fullBody, created: ffEl('ff-created').value || ffToday(),
      };
      ffEl('ff-save-btn').disabled = true;
      ffFlash(ffEl('ff-msg'), 'Saving…', 'muted');
      try {
        const r = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!r.ok) throw new Error('store ' + r.status);
        closeFactForm();
        await loadFacts();   // refresh the grid — the new/updated card appears
        openModal(name);     // open the saved fact
      } catch (err) {
        ffFlash(ffEl('ff-msg'), 'Save failed (' + err.message + '). Is the API running on :8787?', 'err');
      } finally { ffEl('ff-save-btn').disabled = false; }
    }

    async function ffProbe() {
      try { const r = await fetch(EXTRACT_HEALTH); ffExtractOnline = r.ok; } catch { ffExtractOnline = false; }
      const pill = ffEl('ff-extract-pill');
      pill.textContent = ffExtractOnline ? 'extraction ready' : 'extraction offline';
      pill.className = 'text-[11px] font-medium px-2.5 py-1 rounded-full shrink-0 self-center ' + (ffExtractOnline ? 'bg-emerald-600 text-white' : 'bg-amber-500 text-white');
      ffEl('ff-extract-btn').disabled = !ffExtractOnline;
      if (!ffExtractOnline) ffFlash(ffEl('ff-extract-msg'), 'Extractor offline — fill in manually below.', 'muted');
    }

    ffEl('add-fact-btn').addEventListener('click', () => openFactForm('add'));
    ffEl('ff-extract-btn').addEventListener('click', ffExtract);
    ffEl('ff-manual-btn').addEventListener('click', () => ffEl('ff-description').focus());
    ffEl('ff-save-btn').addEventListener('click', ffSave);
    ffEl('ff-cancel-btn').addEventListener('click', closeFactForm);
    ffEl('ff-description').addEventListener('input', () => { if (!ffNameEdited) ffEl('ff-name').value = ffSlug(ffEl('ff-description').value); ffCheckName(); ffRenderBadges(); });
    ffEl('ff-name').addEventListener('input', () => { ffNameEdited = true; ffCheckName(); });
    ffEl('ff-type').addEventListener('change', ffRenderBadges);
    ffEl('ff-source-bot').addEventListener('change', ffRenderBadges);
    document.querySelectorAll('.ff-example').forEach(b => b.addEventListener('click', () => { ffEl('ff-story').value = FF_EXAMPLES[b.textContent] || ''; ffEl('ff-story').focus(); }));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFactForm(); });
    ffProbe();

    loadFacts();
  </script>
</body>
</html>
